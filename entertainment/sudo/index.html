    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }

        .sudoku-cell {
            transition: background-color 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        /* 格線樣式 */
        .sudoku-cell:nth-child(3n) { border-right-width: 2px; border-right-color: #374151; }
        .sudoku-cell:nth-child(9n) { border-right-width: 1px; border-right-color: #9CA3AF; }
        .sudoku-cell:nth-child(n+19):nth-child(-n+27),
        .sudoku-cell:nth-child(n+46):nth-child(-n+54) { border-bottom-width: 2px; border-bottom-color: #374151; }

        .grid-cols-9 > div:nth-child(9n) { border-right-width: 0; }
        .grid-cols-9 > div:nth-last-child(-n+9) { border-bottom-width: 0; }

        /* 選中與高亮 */
        .cell-selected { background-color: #BFDBFE !important; transform: scale(0.95); border-radius: 4px; z-index: 10; }
        .cell-highlight { background-color: #E5E7EB !important; }

        /* 文字顏色 */
        .is-original { color: #111827; font-weight: 800; }
        .is-user { color: #2563EB; font-weight: 600; }

        /* === 新增：錯誤提示樣式 === */
        .is-error {
            color: #EF4444 !important; /* 紅字 */
            background-color: #FEE2E2 !important; /* 紅底 */
            animation: shake 0.3s ease-in-out; /* 晃動動畫 */
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        * { touch-action: manipulation; }
    </style>
</head>

    <!-- Firebase 配置（必須在 Firebase SDK 之前載入） -->
    <script src="firebase-config.js"></script>

    <script type="module">
        // Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置和初始化
        let firebaseConfig;
        let firebaseEnabled = false;
        let app, auth, db;

        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = typeof __firebase_config === 'string'
                    ? JSON.parse(__firebase_config)
                    : __firebase_config;
                firebaseEnabled = true;
                
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                console.log('✅ Firebase 已初始化');
            } else {
                console.log('ℹ️ Firebase 配置未找到');
            }
        } catch (e) {
            console.error('❌ Firebase 初始化失敗:', e);
            firebaseEnabled = false;
        }

        // --- 1. 核心邏輯 ---
        class SudokuCore {
            constructor() {
                this.board = Array(9).fill().map(() => Array(9).fill(0));
                this.solution = Array(9).fill().map(() => Array(9).fill(0));
                this.original = Array(9).fill().map(() => Array(9).fill(0));
            }
            generate(difficulty) {
                this.board = Array(9).fill().map(() => Array(9).fill(0));
                for(let i=0; i<9; i+=3) this.fillBox(i, i);
                this.solve(this.board);
                this.solution = JSON.parse(JSON.stringify(this.board));
                let attempts = difficulty === '1' ? 30 : difficulty === '2' ? 40 : 50;
                this.removeDigits(attempts);
                this.original = JSON.parse(JSON.stringify(this.board));
            }
            fillBox(row, col) {
                let num;
                for(let i=0; i<3; i++) {
                    for(let j=0; j<3; j++) {
                        do { num = Math.floor(Math.random() * 9) + 1; } while(!this.isSafeInBox(row, col, num));
                        this.board[row+i][col+j] = num;
                    }
                }
            }
            isSafeInBox(rowStart, colStart, num) {
                for(let i=0; i<3; i++) for(let j=0; j<3; j++) if(this.board[rowStart+i][colStart+j] === num) return false;
                return true;
            }
            isSafe(grid, row, col, num) {
                for(let x=0; x<9; x++) if(grid[row][x] === num) return false;
                for(let x=0; x<9; x++) if(grid[x][col] === num) return false;
                let startRow = row - row % 3, startCol = col - col % 3;
                for(let i=0; i<3; i++) for(let j=0; j<3; j++) if(grid[i+startRow][j+startCol] === num) return false;
                return true;
            }
            solve(grid) {
                for(let i=0; i<9; i++) {
                    for(let j=0; j<9; j++) {
                        if(grid[i][j] === 0) {
                            for(let num=1; num<=9; num++) {
                                if(this.isSafe(grid, i, j, num)) {
                                    grid[i][j] = num;
                                    if(this.solve(grid)) return true;
                                    grid[i][j] = 0;
                                }
                            }
                            return false;
                        }
                    }
                }
                return true;
            }
            removeDigits(count) {
                while(count > 0) {
                    let cellId = Math.floor(Math.random() * 81);
                    let i = Math.floor(cellId / 9), j = cellId % 9;
                    if(this.board[i][j] !== 0) { this.board[i][j] = 0; count--; }
                }
            }
        }

        // --- 2. 介面控制邏輯 ---
        const core = new SudokuCore();
        let selectedCell = null;
        let timerInterval = null;
        let seconds = 0;
        let isPaused = false; // 暫停狀態

        function initGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'sudoku-cell border-gray-300 border border-collapse text-2xl md:text-3xl select-none';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.onclick = () => selectCell(r, c);
                    container.appendChild(cell);
                }
            }
        }

        function newGame() {
            if (isPaused) togglePause(); // 確保新遊戲時不是暫停狀態
            const diff = document.getElementById('difficulty-select').value;
            core.generate(diff);
            renderBoard();
            resetTimer();
            selectedCell = null;
            highlightSameNumber(0);
        }

        function renderBoard() {
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    const cell = document.querySelector(`.sudoku-cell[data-r='${r}'][data-c='${c}']`);
                    const val = core.board[r][c];
                    const isOrig = core.original[r][c] !== 0;

                    cell.textContent = val === 0 ? '' : val;
                    // 清除所有狀態類別，重新賦予基礎類別
                    cell.className = `sudoku-cell border-gray-300 border text-2xl md:text-3xl select-none ${isOrig ? 'is-original bg-gray-100' : 'is-user bg-white'}`;

                    if(selectedCell && selectedCell.r === r && selectedCell.c === c) {
                        cell.classList.add('cell-selected');
                    }

                    // --- 渲染時保留錯誤狀態 ---
                    // 如果是使用者輸入(非題目)，且值不為0，且值不等於解答 => 標記錯誤
                    if (!isOrig && val !== 0 && val !== core.solution[r][c]) {
                        cell.classList.add('is-error');
                    }
                }
            }
        }

        function selectCell(r, c) {
            if(isPaused) return; // 暫停時禁止選取
            if (core.original[r][c] !== 0) {
                highlightSameNumber(core.board[r][c]);
                return;
            }
            selectedCell = {r, c};
            // 重新渲染以更新選取框，同時保持之前的錯誤標記
            renderBoard();
            highlightSameNumber(core.board[r][c]);
        }

        function highlightSameNumber(num) {
            document.querySelectorAll('.cell-highlight').forEach(el => el.classList.remove('cell-highlight'));
            if(num === 0) return;
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    if(core.board[r][c] === num) {
                        const cell = document.querySelector(`.sudoku-cell[data-r='${r}'][data-c='${c}']`);
                        if(!cell.classList.contains('cell-selected')) cell.classList.add('cell-highlight');
                    }
                }
            }
        }

        // === 核心修改：輸入與即時驗證 ===
        function inputNumber(num) {
            if(!selectedCell || isPaused) return;
            const {r, c} = selectedCell;
            const cell = document.querySelector(`.sudoku-cell[data-r='${r}'][data-c='${c}']`);

            core.board[r][c] = num;

            // 1. 更新文字
            cell.textContent = num === 0 ? '' : num;

            // 2. 即時驗證邏輯
            if (num !== 0) {
                if (num !== core.solution[r][c]) {
                    // 輸入錯誤 -> 加紅字、紅底、晃動
                    cell.classList.add('is-error');
                } else {
                    // 輸入正確 -> 移除錯誤樣式
                    cell.classList.remove('is-error');
                }
            } else {
                // 清除數字 -> 移除錯誤樣式
                cell.classList.remove('is-error');
            }

            highlightSameNumber(num);

            // 檢查是否完成
            checkCompletion();
        }

        // 自動檢查是否全對（無須按鈕）
        function checkCompletion() {
            let isFull = true;
            let isAllCorrect = true;
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    if(core.board[r][c] === 0) isFull = false;
                    if(core.board[r][c] !== core.solution[r][c]) isAllCorrect = false;
                }
            }
            if(isFull && isAllCorrect) {
                clearInterval(timerInterval);
                Swal.fire({
                    icon: 'success',
                    title: '🎉 太神啦！',
                    text: `恭喜完成！耗時: ${document.getElementById('timer').innerText}`,
                    confirmButtonColor: '#10B981'
                });
            }
        }

        function checkGame() {
            // 手動檢查按鈕邏輯 (主要用於檢查是否有漏填)
            let isFull = true;
            let hasError = false;
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    if(core.board[r][c] === 0) isFull = false;
                    else if(core.board[r][c] !== core.solution[r][c]) hasError = true;
                }
            }

            if (hasError) {
                Swal.fire({ icon: 'error', title: '有錯誤', text: '請檢查紅色的格子！', confirmButtonColor: '#EF4444' });
            } else if (!isFull) {
                Swal.fire({ icon: 'info', title: '未完成', text: '還有格子沒填喔！', confirmButtonColor: '#3B82F6' });
            } else {
                checkCompletion(); // 如果全滿且無錯，觸發勝利
            }
        }

        function resetBoard() {
            if(isPaused) return;
            Swal.fire({
                title: '重置盤面？',
                text: "將清除所有進度",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#6B7280',
                cancelButtonColor: '#d33',
                confirmButtonText: '重置'
            }).then((result) => {
                if (result.isConfirmed) {
                    for(let r=0; r<9; r++) {
                        for(let c=0; c<9; c++) {
                            core.board[r][c] = core.original[r][c];
                        }
                    }
                    renderBoard(); // 重新渲染會自動清除 .is-error
                }
            })
        }

        // === 核心修改：計時器與暫停 ===
        function resetTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            isPaused = false;
            updateTimerDisplay();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) { // 只有非暫停時才計時
                    seconds++;
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            const overlay = document.getElementById('pause-overlay');
            const pauseBtn = document.getElementById('pause-btn');

            if (isPaused) {
                // 暫停狀態：顯示遮罩、切換圖標
                overlay.classList.remove('hidden');
                pauseBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'; // Play Icon
            } else {
                // 繼續狀態：隱藏遮罩、切換圖標
                overlay.classList.add('hidden');
                pauseBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'; // Pause Icon
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }

        // 鍵盤監聽
        document.addEventListener('keydown', (e) => {
            if(isPaused) return; // 暫停時鎖定鍵盤
            if(!selectedCell) return;
            if(e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
            if(e.key === 'Backspace' || e.key === 'Delete') inputNumber(0);
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                moveSelection(e.key);
            }
        });

        function moveSelection(key) {
            let {r, c} = selectedCell;
            if(key === 'ArrowUp') r = Math.max(0, r-1);
            if(key === 'ArrowDown') r = Math.min(8, r+1);
            if(key === 'ArrowLeft') c = Math.max(0, c-1);
            if(key === 'ArrowRight') c = Math.min(8, c+1);

            selectedCell = {r, c};
            renderBoard();
            highlightSameNumber(core.board[r][c]);
        }

        initGrid();
        newGame();

        // ========== Firebase 連線狀態 ==========
        // 更新連線狀態顯示
        function updateDbStatus(status, text) {
            const statusEl = document.getElementById('dbStatus');
            const statusTextEl = document.getElementById('dbStatusText');
            
            if (statusEl) {
                // 更新點的顏色
                statusEl.className = `w-2 h-2 rounded-full ${
                    status === 'connected' ? 'bg-emerald-500' :
                    status === 'connecting' ? 'bg-yellow-400' :
                    'bg-red-500'
                }`;
                statusEl.title = text || status;
            }
            
            if (statusTextEl) {
                statusTextEl.innerText = text || '';
                statusTextEl.className = `text-[10px] ${
                    status === 'connected' ? 'text-emerald-500' :
                    status === 'connecting' ? 'text-yellow-400' :
                    'text-gray-400'
                }`;
            }
        }

        // 初始化 Firebase 認證
        async function initFirebase() {
            if (typeof firebaseEnabled === 'undefined' || !firebaseEnabled || typeof auth === 'undefined') {
                updateDbStatus('disabled', '');
                console.log('ℹ️ Firebase 未啟用');
                return;
            }

            try {
                updateDbStatus('connecting', '連線中');
                console.log('🔄 開始 Firebase 匿名認證...');

                // 設定認證狀態監聽器
                const unsubscribe = onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        console.log('✅ Firebase 認證成功');
                        updateDbStatus('connected', '');
                        unsubscribe();
                    } else {
                        console.warn('⚠️ 使用者未認證');
                    }
                });

                // 嘗試匿名登入
                try {
                    await signInAnonymously(auth);
                    console.log('✅ 匿名登入成功');
                } catch (authError) {
                    console.error('❌ Firebase 認證失敗:', authError);
                    updateDbStatus('error', '連線失敗');
                    unsubscribe();
                }

            } catch (e) {
                console.error('❌ Firebase 初始化錯誤:', e);
                updateDbStatus('error', '初始化失敗');
            }
        }

        // 啟動 Firebase
        initFirebase();
    </script>
</body>
</html>
